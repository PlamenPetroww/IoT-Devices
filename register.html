<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8" />
    <title>Регистрация – Auro HomeSystems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
    <div class="auth-box">
        <h1>Auro HomeSystems</h1>
        <p class="subtitle">Създаване на профил</p>
        <form id="registerForm" class="auth-form">
            <div id="registerError" class="auth-error"></div>
            <label for="email">Имейл</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="your@email.com" />
            <label for="password">Парола (мин. 6 символа)</label>
            <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" placeholder="••••••••" />
            <label for="password2">Повтори паролата</label>
            <input type="password" id="password2" name="password2" required minlength="6" autocomplete="new-password" placeholder="••••••••" />
            <button type="submit" id="submitBtn">Регистрация</button>
        </form>
        <p class="auth-links">
            Вече имате профил? <a href="login.html">Вход</a><br />
            <a href="index.html">← Обратно към сайта</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const form = document.getElementById("registerForm");
        const errorEl = document.getElementById("registerError");
        const submitBtn = document.getElementById("submitBtn");

        function showError(msg) {
            errorEl.textContent = msg || "";
            errorEl.classList.toggle("visible", !!msg);
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const password2 = document.getElementById("password2").value;
            if (!email || !password) return;
            if (password !== password2) {
                showError("Паролите не съвпадат.");
                return;
            }
            if (password.length < 6) {
                showError("Паролата трябва да е поне 6 символа.");
                return;
            }
            showError("");
            submitBtn.disabled = true;
            submitBtn.textContent = "Регистриране...";

            try {
                await firebase.auth().createUserWithEmailAndPassword(email, password);
                window.location.href = "dashboard.html";
            } catch (err) {
                if (err.code === "auth/email-already-in-use") showError("Този имейл вече е регистриран.");
                else if (err.code === "auth/invalid-email") showError("Невалиден имейл.");
                else if (err.code === "auth/weak-password") showError("Паролата е твърде слаба (мин. 6 символа).");
                else showError(err.message || "Грешка при регистрация.");
                submitBtn.disabled = false;
                submitBtn.textContent = "Регистрация";
            }
        });
    </script>
</body>
</html>
