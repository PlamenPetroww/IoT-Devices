<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <title>Вход – Aura HomeSystems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-box">
      <h1>Aura HomeSystems</h1>
      <p class="subtitle">Вход в таблото</p>
      <form id="loginForm" class="auth-form">
        <div id="loginError" class="auth-error"></div>
        <div id="loginSuccess" class="auth-success"></div>
        <label for="email">Имейл</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          autocomplete="email"
          placeholder="you@example.com"
        />
        <div class="auth-field-row">
          <label for="password">Парола</label>
          <a href="#" class="auth-forgot-link" id="forgotPasswordLink"
            >Забравена парола?</a
          >
        </div>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
        <button type="submit" id="submitBtn">Вход</button>
      </form>
      <p class="auth-links">
        Нямате профил? <a href="register.html">Регистрация</a><br />
        <a href="index.html">← Обратно към сайта</a>
      </p>
      <p class="auth-footer">
        <a href="delete-account.html">Изтриване на акаунт</a> ·
        <a href="impressum.html">Импресум</a> ·
        <a href="privacy.html">Политика за поверителност</a>
      </p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      const form = document.getElementById("loginForm");
      const errorEl = document.getElementById("loginError");
      const successEl = document.getElementById("loginSuccess");
      const submitBtn = document.getElementById("submitBtn");
      const auth = firebase.auth();
      const db = firebase.database();
      auth.languageCode = "bg";
      function showError(msg) {
        errorEl.textContent = msg || "";
        errorEl.classList.toggle("visible", !!msg);
        if (msg) {
          successEl.textContent = "";
          successEl.classList.remove("visible");
        }
      }
      function showSuccess(msg) {
        successEl.textContent = msg || "";
        successEl.classList.toggle("visible", !!msg);
        if (msg) {
          errorEl.textContent = "";
          errorEl.classList.remove("visible");
        }
      }
      /** Страница с две полета за нова парола; 127.0.0.1 → localhost за Authorized domains. */
      function getPasswordResetHandlerUrl() {
        const page = new URL(window.location.href);
        if (page.hostname === "127.0.0.1" || page.hostname === "::1") {
          page.hostname = "localhost";
        }
        return new URL("reset-password.html", page.href).href;
      }
      const forgotLink = document.getElementById("forgotPasswordLink");
      forgotLink.addEventListener("click", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        showError("");
        showSuccess("");
        if (!email) {
          showError(
            "Въведете имейла си по-горе – на него ще изпратим линк за нова парола.",
          );
          document.getElementById("email").focus();
          return;
        }
        const prevText = forgotLink.textContent;
        forgotLink.style.pointerEvents = "none";
        forgotLink.textContent = "Изпращане…";
        const prevLang = auth.languageCode;
        auth.languageCode = "en";
        try {
          const handlerUrl = getPasswordResetHandlerUrl();
          await auth.sendPasswordResetEmail(email, {
            url: handlerUrl,
            handleCodeInApp: false,
          });
          showSuccess(
            "Ако адресът е регистриран, ще получите имейл на английски. В „Спам“ често линковете не се отварят с клик – преместете писмото във входящи или копирайте пълния URL в браузър. След отваряне въведете новата парола два пъти. Action URL в Firebase → Templates → Password reset: пълен https://…/reset-password.html; в шаблона добавете ред с %LINK% за копиране (AUTH_SETUP.txt).",
          );
        } catch (err) {
          if (err.code === "auth/user-not-found")
            showError("Няма регистрация с този имейл.");
          else if (err.code === "auth/invalid-email")
            showError("Невалиден имейл.");
          else if (
            err.code === "auth/unauthorized-continue-uri" ||
            err.code === "auth/invalid-continue-uri"
          )
            showError(
              "Доменът на тази страница не е в списъка „Authorized domains“ в Firebase (Authentication → Settings). Добавете го и опитайте отново.",
            );
          else showError(err.message || "Неуспешно изпращане. Опитайте отново.");
        } finally {
          auth.languageCode = prevLang || "bg";
          forgotLink.style.pointerEvents = "";
          forgotLink.textContent = prevText;
        }
      });
      function getOrCreateDeviceId() {
        try {
          const key = "auraDeviceId";
          let id = localStorage.getItem(key);
          if (!id) {
            id =
              "web-" +
              Math.random().toString(36).slice(2) +
              Date.now().toString(36);
            localStorage.setItem(key, id);
          }
          return id;
        } catch (_) {
          return (
            "web-" +
            Math.random().toString(36).slice(2) +
            Date.now().toString(36)
          );
        }
      }
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) return;
        showError("");
        showSuccess("");
        submitBtn.disabled = true;
        submitBtn.textContent = "Вход...";
        try {
          const cred = await auth.signInWithEmailAndPassword(email, password);
          const user = cred.user;
          const deviceId = getOrCreateDeviceId();
          const sessionsRef = db.ref("users/" + user.uid + "/sessions");
          const snap = await sessionsRef.once("value");
          const sessions = snap.val() || {};
          const knownIds = Object.keys(sessions);
          if (!sessions[deviceId] && knownIds.length >= 2) {
            await auth.signOut();
            showError(
              "Този акаунт може да се ползва на до 2 устройства. Ако искаш да влезеш от ново устройство, излез от някое от останалите.",
            );
            submitBtn.disabled = false;
            submitBtn.textContent = "Вход";
            return;
          }
          await sessionsRef.child(deviceId).set({
            createdAt: firebase.database.ServerValue.TIMESTAMP,
            lastSeen: firebase.database.ServerValue.TIMESTAMP,
            userAgent: navigator.userAgent || "",
          });
          const params = new URLSearchParams(window.location.search);
          const next = params.get("next");
          const allowedNext = ["delete-account.html", "dashboard.html"];
          const target =
            next && allowedNext.includes(next) ? next : "dashboard.html";
          window.location.href = target;
        } catch (err) {
          if (err.code === "auth/user-not-found")
            showError("Няма потребител с този имейл.");
          else if (
            err.code === "auth/wrong-password" ||
            err.code === "auth/invalid-credential"
          )
            showError("Грешна парола или имейл.");
          else if (err.code === "auth/invalid-email")
            showError("Невалиден имейл.");
          else showError(err.message || "Грешка при вход.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Вход";
        }
      });
    </script>
  </body>
</html>
