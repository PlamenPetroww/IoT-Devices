<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8" />
    <title>Вход – Aura Home Systems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
    <div class="auth-box">
        <h1>Aura Home Systems</h1>
        <p class="subtitle">Вход в таблото</p>
        <form id="loginForm" class="auth-form">
            <div id="loginError" class="auth-error"></div>
            <label for="email">Имейл</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="your@email.com" />
            <label for="password">Парола</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
            <button type="submit" id="submitBtn">Вход</button>
        </form>
        <p class="auth-links">
            Нямате профил? <a href="register.html">Регистрация</a><br />
            <a href="index.html">← Обратно към сайта</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const form = document.getElementById("loginForm");
        const errorEl = document.getElementById("loginError");
        const submitBtn = document.getElementById("submitBtn");

        function showError(msg) {
            errorEl.textContent = msg || "";
            errorEl.classList.toggle("visible", !!msg);
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            if (!email || !password) return;
            showError("");
            submitBtn.disabled = true;
            submitBtn.textContent = "Вход...";

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                window.location.href = "dashboard.html";
            } catch (err) {
                if (err.code === "auth/user-not-found") showError("Няма потребител с този имейл.");
                else if (err.code === "auth/wrong-password" || err.code === "auth/invalid-credential") showError("Грешна парола или имейл.");
                else if (err.code === "auth/invalid-email") showError("Невалиден имейл.");
                else showError(err.message || "Грешка при вход.");
                submitBtn.disabled = false;
                submitBtn.textContent = "Вход";
            }
        });
    </script>
</body>
</html>
