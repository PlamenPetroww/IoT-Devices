<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <title>Нова парола – Aura HomeSystems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-box">
      <h1>Aura HomeSystems</h1>
      <p class="subtitle">Задаване на нова парола</p>

      <p id="resetStatus" class="subtitle" style="margin-top: -8px; display: none"></p>

      <div id="resetError" class="auth-error"></div>
      <div id="resetSuccess" class="auth-success"></div>

      <div id="invalidLinkBlock" style="display: none">
        <p class="subtitle" style="text-align: left; line-height: 1.5">
          Линкът е невалиден или изтекъл. Поискайте нов имейл от страницата за вход
          („Забравена парола?“).
        </p>
        <p class="auth-links" style="margin-top: 16px">
          <a href="login.html">Към вход</a>
        </p>
      </div>

      <form id="resetForm" class="auth-form" style="display: none">
        <p
          class="subtitle"
          style="text-align: left; margin-bottom: 16px; font-size: 0.88rem"
        >
          Акаунт: <strong id="resetEmailDisplay"></strong>
        </p>
        <label for="password">Нова парола (мин. 6 символа)</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="6"
          autocomplete="new-password"
          placeholder="••••••••"
        />
        <label for="password2">Повтори новата парола</label>
        <input
          type="password"
          id="password2"
          name="password2"
          required
          minlength="6"
          autocomplete="new-password"
          placeholder="••••••••"
        />
        <button type="submit" id="submitBtn">Запази паролата</button>
      </form>

      <p id="afterSuccessLinks" class="auth-links" style="display: none">
        <a href="login.html">Към вход</a>
      </p>

      <p class="auth-links" style="margin-top: 20px">
        <a href="index.html">← Обратно към сайта</a>
      </p>
      <p class="auth-footer">
        <a href="delete-account.html">Изтриване на акаунт</a> ·
        <a href="impressum.html">Импресум</a> ·
        <a href="privacy.html">Политика за поверителност</a>
      </p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      const auth = firebase.auth();
      const errorEl = document.getElementById("resetError");
      const successEl = document.getElementById("resetSuccess");
      const statusEl = document.getElementById("resetStatus");
      const invalidBlock = document.getElementById("invalidLinkBlock");
      const resetForm = document.getElementById("resetForm");
      const submitBtn = document.getElementById("submitBtn");

      function showErr(msg) {
        errorEl.textContent = msg || "";
        errorEl.classList.toggle("visible", !!msg);
        if (msg) {
          successEl.textContent = "";
          successEl.classList.remove("visible");
        }
      }
      function showOk(msg) {
        successEl.textContent = msg || "";
        successEl.classList.toggle("visible", !!msg);
        if (msg) {
          errorEl.textContent = "";
          errorEl.classList.remove("visible");
        }
      }

      const params = new URLSearchParams(window.location.search);
      const oobCode = params.get("oobCode");

      if (!oobCode) {
        invalidBlock.style.display = "block";
      } else {
        statusEl.style.display = "block";
        statusEl.textContent = "Проверка на линка…";
        auth.languageCode = "bg";
        auth
          .verifyPasswordResetCode(oobCode)
          .then(function (email) {
            statusEl.style.display = "none";
            document.getElementById("resetEmailDisplay").textContent = email;
            resetForm.style.display = "block";
            resetForm.dataset.oobCode = oobCode;
          })
          .catch(function () {
            statusEl.style.display = "none";
            invalidBlock.style.display = "block";
          });
      }

      resetForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const code = resetForm.dataset.oobCode;
        const p1 = document.getElementById("password").value;
        const p2 = document.getElementById("password2").value;
        showErr("");
        showOk("");
        if (p1 !== p2) {
          showErr("Паролите не съвпадат.");
          return;
        }
        if (p1.length < 6) {
          showErr("Паролата трябва да е поне 6 символа.");
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = "Запис…";
        auth
          .confirmPasswordReset(code, p1)
          .then(function () {
            resetForm.style.display = "none";
            showOk("Паролата е сменена успешно. Можете да влезете с новата парола.");
            document.getElementById("afterSuccessLinks").style.display = "block";
          })
          .catch(function (err) {
            if (err.code === "auth/expired-action-code")
              showErr("Линкът е изтекъл. Поискайте нов имейл от „Забравена парола?“.");
            else if (err.code === "auth/invalid-action-code")
              showErr("Невалиден линк. Поискайте нов имейл.");
            else if (err.code === "auth/weak-password")
              showErr("Паролата е твърде слаба. Изберете по-дълга парола.");
            else showErr(err.message || "Грешка при смяна на паролата.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Запази паролата";
          });
      });
    </script>
  </body>
</html>
