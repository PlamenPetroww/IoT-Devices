<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="app-mode.js"></script>
    <title>New password – Aura HomeSystems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aura Home" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-box">
      <h1>Aura HomeSystems</h1>
      <p class="subtitle" data-i18n="auth.resetSubtitle">Задаване на нова парола</p>

      <p
        id="resetStatus"
        class="subtitle"
        style="margin-top: -8px; display: none"
        data-i18n="auth.resetChecking"
      ></p>

      <div id="resetError" class="auth-error"></div>
      <div id="resetSuccess" class="auth-success"></div>

      <div id="invalidLinkBlock" style="display: none">
        <p
          class="subtitle"
          style="text-align: left; line-height: 1.5"
          data-i18n="auth.resetInvalidHint"
        >
          Линкът е невалиден или изтекъл. Поискайте нов имейл от страницата за вход
          („Забравена парола?“).
        </p>
        <p class="auth-links" style="margin-top: 16px">
          <a href="login.html" data-i18n="auth.resetToLogin">Към вход</a>
        </p>
      </div>

      <form id="resetForm" class="auth-form" style="display: none">
        <p
          class="subtitle"
          style="text-align: left; margin-bottom: 16px; font-size: 0.88rem"
        >
          <span data-i18n="auth.resetAccountLabel">Акаунт:</span>
          <strong id="resetEmailDisplay"></strong>
        </p>
        <label for="password" data-i18n="auth.resetNewPassword"
          >Нова парола (мин. 6 символа)</label
        >
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="6"
          autocomplete="new-password"
          data-i18n-placeholder="auth.passwordPlaceholder"
          placeholder="••••••••"
        />
        <label for="password2" data-i18n="auth.resetNewPassword2"
          >Повтори новата парола</label
        >
        <input
          type="password"
          id="password2"
          name="password2"
          required
          minlength="6"
          autocomplete="new-password"
          data-i18n-placeholder="auth.passwordPlaceholder"
          placeholder="••••••••"
        />
        <button type="submit" id="submitBtn" data-i18n="auth.resetSubmit">
          Запази паролата
        </button>
      </form>

      <p id="afterSuccessLinks" class="auth-links" style="display: none">
        <a href="login.html" data-i18n="auth.resetToLogin">Към вход</a>
      </p>

      <p class="auth-links" style="margin-top: 20px">
        <a href="index.html" data-i18n="auth.backToSite">← Обратно към сайта</a>
      </p>
      <p class="auth-footer">
        <a href="delete-account.html" data-i18n="auth.deleteAccount"
          >Изтриване на акаунт</a
        >
        ·
        <a href="impressum.html" data-i18n="footer.impressum">Импресум</a> ·
        <a href="privacy.html" data-i18n="footer.privacy"
          >Политика за поверителност</a
        >
      </p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="translations.js"></script>
    <script src="auth-i18n.js"></script>
    <script src="auth-reset.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      initAuthI18n("reset");
      const auth = firebase.auth();
      auth.languageCode = firebaseAuthLang();
      const errorEl = document.getElementById("resetError");
      const successEl = document.getElementById("resetSuccess");
      const statusEl = document.getElementById("resetStatus");
      const invalidBlock = document.getElementById("invalidLinkBlock");
      const resetForm = document.getElementById("resetForm");
      const submitBtn = document.getElementById("submitBtn");

      function showErr(msg) {
        errorEl.textContent = msg || "";
        errorEl.classList.toggle("visible", !!msg);
        if (msg) {
          successEl.textContent = "";
          successEl.classList.remove("visible");
        }
      }
      function showOk(msg) {
        successEl.textContent = msg || "";
        successEl.classList.toggle("visible", !!msg);
        if (msg) {
          errorEl.textContent = "";
          errorEl.classList.remove("visible");
        }
      }

      const oobCode = AuraAuthReset.extractPasswordResetCode();

      if (!oobCode) {
        invalidBlock.style.display = "block";
      } else {
        statusEl.style.display = "block";
        statusEl.textContent = authT("auth.resetChecking");
        auth
          .verifyPasswordResetCode(oobCode)
          .then(function (email) {
            statusEl.style.display = "none";
            document.getElementById("resetEmailDisplay").textContent = email;
            resetForm.style.display = "block";
            resetForm.dataset.oobCode = oobCode;
          })
          .catch(function () {
            statusEl.style.display = "none";
            invalidBlock.style.display = "block";
          });
      }

      resetForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const code = resetForm.dataset.oobCode;
        const p1 = document.getElementById("password").value;
        const p2 = document.getElementById("password2").value;
        showErr("");
        showOk("");
        if (p1 !== p2) {
          showErr(authT("auth.errPasswordMismatch"));
          return;
        }
        if (p1.length < 6) {
          showErr(authT("auth.errPasswordShort"));
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = authT("auth.resetSaving");
        auth
          .confirmPasswordReset(code, p1)
          .then(function () {
            resetForm.style.display = "none";
            showOk(authT("auth.resetSuccess"));
            document.getElementById("afterSuccessLinks").style.display = "block";
          })
          .catch(function (err) {
            if (err.code === "auth/expired-action-code")
              showErr(authT("auth.resetExpired"));
            else if (err.code === "auth/invalid-action-code")
              showErr(authT("auth.resetInvalidCode"));
            else if (err.code === "auth/weak-password")
              showErr(authT("auth.errWeakPassword"));
            else showErr(err.message || authT("auth.resetFailed"));
            submitBtn.disabled = false;
            submitBtn.textContent = authT("auth.resetSubmit");
          });
      });
    </script>
  </body>
</html>
