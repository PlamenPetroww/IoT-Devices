<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="app-mode.js"></script>
    <title>Register – Aura HomeSystems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aura Home" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page" data-i18n-page="register">
    <div class="auth-box">
      <h1>Aura HomeSystems</h1>
      <p class="subtitle" data-i18n="auth.registerSubtitle">Създаване на профил</p>
      <form id="registerForm" class="auth-form">
        <div id="registerError" class="auth-error"></div>
        <button type="button" id="setPasswordBtn" style="display: none"></button>
        <label for="email" data-i18n="auth.email">Имейл</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          autocomplete="email"
          placeholder="your@email.com"
        />
        <label for="password" data-i18n="auth.passwordMin">Парола (мин. 6 символа)</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="6"
          autocomplete="new-password"
          placeholder="••••••••"
        />
        <label for="password2" data-i18n="auth.password2">Повтори паролата</label>
        <input
          type="password"
          id="password2"
          name="password2"
          required
          minlength="6"
          autocomplete="new-password"
          placeholder="••••••••"
        />
        <button type="submit" id="submitBtn" data-i18n="auth.submitRegister">Регистрация</button>
      </form>
      <p class="auth-links">
        <span data-i18n="auth.haveAccount">Вече имате профил?</span>
        <a href="login.html" data-i18n="nav.login">Вход</a><br />
        <a href="index.html" data-i18n="auth.backToSite">← Обратно към сайта</a>
      </p>
      <p class="auth-footer">
        <a href="delete-account.html" data-i18n="auth.deleteAccount">Изтриване на акаунт</a> ·
        <a href="impressum.html" data-i18n="footer.impressum">Импресум</a> ·
        <a href="privacy.html" data-i18n="footer.privacy">Политика за поверителност</a>
      </p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="translations.js"></script>
    <script src="auth-i18n.js"></script>
    <script src="inquiry-config.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      initAuthI18n("register");
      const form = document.getElementById("registerForm");
      const errorEl = document.getElementById("registerError");
      const submitBtn = document.getElementById("submitBtn");
      const setPasswordBtn = document.getElementById("setPasswordBtn");
      firebase.auth().languageCode = firebaseAuthLang();
      window.addEventListener("aura-lang-applied", function () {
        firebase.auth().languageCode = firebaseAuthLang();
      });
      function showError(msg) {
        errorEl.textContent = msg || "";
        errorEl.classList.toggle("visible", !!msg);
      }
      // Акаунт, създаден от сензора (без парола): един клик праща "set password" линк.
      function offerSetPassword(email) {
        setPasswordBtn.textContent = authT("auth.sendSetPasswordLink");
        setPasswordBtn.style.display = "block";
        setPasswordBtn.onclick = async () => {
          setPasswordBtn.disabled = true;
          try {
            const apiBase =
              typeof window.INQUIRY_FUNCTIONS_BASE_URL === "string"
                ? window.INQUIRY_FUNCTIONS_BASE_URL.replace(/\/$/, "")
                : "";
            let sent = false;
            if (apiBase) {
              try {
                const res = await fetch(apiBase + "/api/password-reset", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ email: email, lang: getAuraLang() }),
                });
                const data = await res.json().catch(() => ({}));
                sent = res.ok && data && data.success;
              } catch (_) {}
            }
            if (!sent) {
              await firebase.auth().sendPasswordResetEmail(email);
            }
            showError("");
            errorEl.textContent = authT("auth.setPasswordLinkSent");
            errorEl.classList.add("visible");
            setPasswordBtn.style.display = "none";
          } catch (e) {
            errorEl.textContent = authT("auth.setPasswordLinkFailed");
            errorEl.classList.add("visible");
            setPasswordBtn.disabled = false;
          }
        };
      }
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;
        if (!email || !password) return;
        if (password !== password2) {
          showError(authT("auth.errPasswordMismatch"));
          return;
        }
        if (password.length < 6) {
          showError(authT("auth.errPasswordShort"));
          return;
        }
        showError("");
        submitBtn.disabled = true;
        submitBtn.textContent = authT("auth.submittingRegister");
        try {
          await firebase.auth().createUserWithEmailAndPassword(email, password);
          const user = firebase.auth().currentUser;
          if (user) {
            const key = email.trim().toLowerCase().replace(/\./g, "-").replace(/@/g, "_at_");
            await firebase.database().ref("userEmailKeys/" + user.uid).set(key);
          }
          window.location.href = "dashboard.html";
        } catch (err) {
          if (err.code === "auth/email-already-in-use") {
            showError(authT("auth.errEmailInUse"));
            offerSetPassword(email);
          } else if (err.code === "auth/invalid-email")
            showError(authT("auth.errInvalidEmail"));
          else if (err.code === "auth/weak-password")
            showError(authT("auth.errWeakPassword"));
          else showError(err.message || authT("auth.errRegisterFailed"));
          submitBtn.disabled = false;
          submitBtn.textContent = authT("auth.submitRegister");
        }
      });
    </script>
  </body>
</html>
