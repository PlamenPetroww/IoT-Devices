<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="app-mode.js"></script>
    <title>Sign in – Aura HomeSystems</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Aura Home" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-box">
      <h1>Aura HomeSystems</h1>
      <p class="subtitle" data-i18n="auth.loginSubtitle">Вход в таблото</p>
      <form id="loginForm" class="auth-form">
        <div id="loginError" class="auth-error"></div>
        <div id="loginSuccess" class="auth-success"></div>
        <label for="email" data-i18n="auth.email">Имейл</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          autocomplete="email"
          placeholder="you@example.com"
        />
        <div class="auth-field-row">
          <label for="password" data-i18n="auth.password">Парола</label>
          <a href="#" class="auth-forgot-link" id="forgotPasswordLink" data-i18n="auth.forgotPassword"
            >Забравена парола?</a
          >
        </div>
        <p class="auth-hint" data-i18n="auth.forgotPasswordHint">
          Въведете имейла си в полето по-горе, после натиснете „Забравена парола?“.
        </p>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
        <button type="submit" id="submitBtn" data-i18n="auth.submitLogin">Вход</button>
      </form>
      <p class="auth-links">
        <span data-i18n="auth.noAccount">Нямате профил?</span>
        <a href="register.html" data-i18n="nav.register">Регистрация</a><br />
        <a href="index.html" data-i18n="auth.backToSite">← Обратно към сайта</a>
      </p>
      <p class="auth-footer">
        <a href="delete-account.html" data-i18n="auth.deleteAccount">Изтриване на акаунт</a> ·
        <a href="impressum.html" data-i18n="footer.impressum">Импресум</a> ·
        <a href="privacy.html" data-i18n="footer.privacy">Политика за поверителност</a>
      </p>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="translations.js"></script>
    <script src="auth-i18n.js"></script>
    <script src="auth-reset.js"></script>
    <script src="inquiry-config.js"></script>
    <script src="firebase-config.js"></script>
    <script>
      if (window.AuraAuthReset && AuraAuthReset.redirectToResetPageIfCodePresent()) {
        /* пренасочване към reset-password.html */
      }
      initAuthI18n("login");
      const form = document.getElementById("loginForm");
      const errorEl = document.getElementById("loginError");
      const successEl = document.getElementById("loginSuccess");
      const submitBtn = document.getElementById("submitBtn");
      const forgotLink = document.getElementById("forgotPasswordLink");
      const auth = firebase.auth();
      const db = firebase.database();
      auth.languageCode = firebaseAuthLang();
      auth.onAuthStateChanged(function (user) {
        if (user && window.AuraAppMode && AuraAppMode.isPlayApp()) {
          var emailKey = user.email
            .trim()
            .toLowerCase()
            .replace(/\./g, "-")
            .replace(/@/g, "_at_");
          var dashTarget = "dashboard.html?aura_user_key=" + encodeURIComponent(emailKey);
          try {
            var storedDid = localStorage.getItem("auraDeviceId");
            if (storedDid) {
              dashTarget += "&aura_did=" + encodeURIComponent(storedDid);
            }
          } catch (_) {}
          window.location.replace(dashTarget);
        }
      });
      function showError(msg) {
        errorEl.textContent = msg || "";
        errorEl.classList.toggle("visible", !!msg);
        if (msg) {
          successEl.textContent = "";
          successEl.classList.remove("visible");
        }
      }
      function showSuccess(msg) {
        successEl.textContent = msg || "";
        successEl.classList.toggle("visible", !!msg);
        if (msg) {
          errorEl.textContent = "";
          errorEl.classList.remove("visible");
        }
      }
      forgotLink.addEventListener("click", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        showError("");
        showSuccess("");
        if (!email) {
          showError(authT("auth.errEnterEmailForReset"));
          document.getElementById("email").focus();
          return;
        }
        forgotLink.style.pointerEvents = "none";
        forgotLink.textContent = authT("auth.sending");
        auth.languageCode = firebaseAuthLang();
        try {
          const apiBase =
            typeof window.INQUIRY_FUNCTIONS_BASE_URL === "string"
              ? window.INQUIRY_FUNCTIONS_BASE_URL.replace(/\/$/, "")
              : "";
          let sentViaApi = false;
          if (apiBase) {
            try {
              const res = await fetch(apiBase + "/api/password-reset", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, lang: getAuraLang() }),
              });
              const contentType = res.headers.get("content-type") || "";
              const isJson = contentType.includes("application/json");
              if (res.ok && isJson) {
                const data = await res.json().catch(() => ({}));
                if (data && data.success) {
                  sentViaApi = true;
                  showSuccess(authT("auth.resetEmailSentResend"));
                } else {
                  throw new Error(
                    (data && data.error) || "Invalid password-reset response"
                  );
                }
              } else if (res.status === 503) {
                // Не пращаме към Firebase, защото в този случай това води до "фалшиво успех" без реални имейли.
                showError(authT("auth.resetServiceNotConfigured"));
                return;
              } else {
                const data = isJson ? await res.json().catch(() => ({})) : {};
                throw new Error(
                  (data && data.error) ||
                    (res.ok ? "Server missing /api/password-reset (push server.js to Render)" : "API " + res.status)
                );
              }
            } catch (apiErr) {
              console.warn("[Aura] password-reset API:", apiErr);
              showError(authT("auth.resetServiceNotConfigured"));
              return;
            }
          }
          if (!sentViaApi) {
            const handlerUrl = AuraAuthReset.getPasswordResetHandlerUrl();
            await auth.sendPasswordResetEmail(email, {
              url: handlerUrl,
              handleCodeInApp: false,
            });
            showSuccess(authT("auth.resetEmailSent"));
          }
        } catch (err) {
          if (err.code === "auth/user-not-found")
            showError(authT("auth.errUserNotFound"));
          else if (err.code === "auth/invalid-email")
            showError(authT("auth.errInvalidEmail"));
          else if (
            err.code === "auth/unauthorized-continue-uri" ||
            err.code === "auth/invalid-continue-uri"
          )
            showError(authT("auth.errUnauthorizedDomain"));
          else if (err.code === "auth/operation-not-allowed")
            showError(authT("auth.errOperationNotAllowed"));
          else {
            console.error("[Aura] sendPasswordResetEmail:", err.code, err.message);
            showError(err.message || authT("auth.errResetFailed"));
          }
        } finally {
          auth.languageCode = firebaseAuthLang();
          forgotLink.style.pointerEvents = "";
          forgotLink.textContent = authT("auth.forgotPassword");
        }
      });
      function getSafeEmail(email) {
        if (!email) return "";
        return email
          .trim()
          .toLowerCase()
          .replace(/\./g, "-")
          .replace(/@/g, "_at_");
      }
      function getOrCreateDeviceId() {
        try {
          const key = "auraDeviceId";
          let id = localStorage.getItem(key);
          if (!id) {
            id =
              "web-" +
              Math.random().toString(36).slice(2) +
              Date.now().toString(36);
            localStorage.setItem(key, id);
          }
          return id;
        } catch (_) {
          return (
            "web-" +
            Math.random().toString(36).slice(2) +
            Date.now().toString(36)
          );
        }
      }
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) return;
        showError("");
        showSuccess("");
        submitBtn.disabled = true;
        submitBtn.textContent = authT("auth.submittingLogin");
        try {
          const cred = await auth.signInWithEmailAndPassword(email, password);
          const user = cred.user;
          const emailKey = getSafeEmail(user.email);
          await db.ref("userEmailKeys/" + user.uid).set(emailKey);
          const deviceId = getOrCreateDeviceId();
          const sessionsRef = db.ref("users/" + emailKey + "/sessions");
          const snap = await sessionsRef.once("value");
          const sessions = snap.val() || {};
          const knownIds = Object.keys(sessions);
          if (!sessions[deviceId] && knownIds.length >= 3) {
            await auth.signOut();
            showError(authT("auth.errSessionLimit"));
            submitBtn.disabled = false;
            submitBtn.textContent = authT("auth.submitLogin");
            return;
          }
          await sessionsRef.child(deviceId).set({
            createdAt: firebase.database.ServerValue.TIMESTAMP,
            lastSeen: firebase.database.ServerValue.TIMESTAMP,
            userAgent: navigator.userAgent || "",
          });
          const params = new URLSearchParams(window.location.search);
          const next = params.get("next");
          const allowedNext = ["delete-account.html", "dashboard.html"];
          const target =
            next && allowedNext.includes(next) ? next : "dashboard.html";
          const sep = target.indexOf("?") === -1 ? "?" : "&";
          let loginTarget =
            target + sep + "aura_user_key=" + encodeURIComponent(emailKey);
          try {
            const storedDid = localStorage.getItem("auraDeviceId");
            if (storedDid) {
              loginTarget += "&aura_did=" + encodeURIComponent(storedDid);
            }
          } catch (_) {}
          window.location.href = loginTarget;
        } catch (err) {
          if (err.code === "auth/user-not-found")
            showError(authT("auth.errNoUser"));
          else if (
            err.code === "auth/wrong-password" ||
            err.code === "auth/invalid-credential"
          )
            showError(authT("auth.errWrongPassword"));
          else if (err.code === "auth/invalid-email")
            showError(authT("auth.errInvalidEmail"));
          else showError(err.message || authT("auth.errLoginFailed"));
          submitBtn.disabled = false;
          submitBtn.textContent = authT("auth.submitLogin");
        }
      });
    </script>
  </body>
</html>
